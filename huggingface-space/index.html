<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,follow" />
    <title>EcoLogits Calculator has moved</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #073f3a;
        background: white;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: white;
      }

      main {
        width: min(36rem, 100%);
        text-align: center;
      }

      .logo {
        display: block;
        width: min(28rem, 100%);
        height: auto;
        margin: 0 auto 2.5rem;
      }

      p {
        margin: 0;
        color: #073f3a;
        font-size: 1.125rem;
        line-height: 1.6;
      }

      p a {
        color: inherit;
        font-weight: 700;
      }

      .external-link-icon {
        display: inline-block;
        margin-left: 0.2rem;
        font-size: 0.85em;
        text-decoration: none;
      }

    </style>
  </head>
  <body>
    <main>
      <img
        class="logo"
        src="https://raw.githubusercontent.com/mlco2/ecologits-calculator/main/assets/logo.png"
        alt="EcoLogits Calculator"
      />
      <p>
        The EcoLogits Calculator is now available at<br />
        <a href="https://calculator.ecologits.ai/" target="_blank" rel="noopener noreferrer">
          calculator.ecologits.ai<span class="external-link-icon" aria-hidden="true">↗</span>
        </a>
      </p>
    </main>
  </body>
</html>
