name: Deploy to Clever Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: clever-cloud-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: clever-cloud-production
      url: https://calculator.ecologits.ai

    steps:
      - name: Check out commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Deploy to Clever Cloud
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          CLEVER_APP_ID: ${{ secrets.CLEVER_APP_ID }}
        run: |
          npx --yes clever-tools@4.10.0 link "$CLEVER_APP_ID"
          npx --yes clever-tools@4.10.0 deploy --force
